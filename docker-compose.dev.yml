services:
  app:
    build:
      context: .
      dockerfile: dockerfile
    image: uesc-api-app:dev
    container_name: uesc-api-app
    restart: unless-stopped
    ports:
      - "8000:80"
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=uesc_api
      - DB_USERNAME=root
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
    volumes:
      - .:/var/www
      # Evitar que las dependencias instaladas en el contenedor sean sobrescritas por el host
      # si estas no existen o difieren.
      - /var/www/vendor
      - /var/www/node_modules
    depends_on:
      - db
      - redis

  db:
    image: mysql:8.0
    container_name: uesc-api-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: uesc_api
      MYSQL_ROOT_PASSWORD: secret
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: uesc-api-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  db_data:
    driver: local
  redis_data:
    driver: local
